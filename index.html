<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Connect – CUNY Career Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f3; }
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f1efe8;
      --color-background-tertiary: #e8e6df;
      --color-text-primary: #1a1917;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #9b9a96;
      --color-border-primary: #c4c2bb;
      --color-border-secondary: #d4d2cb;
      --color-border-tertiary: #e4e2db;
      --font-sans: system-ui, -apple-system, sans-serif;
      --border-radius-md: 6px;
      --border-radius-lg: 10px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // localStorage shim replacing Claude's window.storage API
    window.storage = {
      async get(key) {
        try {
          const val = localStorage.getItem(key);
          return val !== null ? { key, value: val } : null;
        } catch { return null; }
      },
      async set(key, value) {
        try {
          localStorage.setItem(key, value);
          return { key, value };
        } catch { return null; }
      },
      async delete(key) {
        try {
          localStorage.removeItem(key);
          return { key, deleted: true };
        } catch { return null; }
      },
      async list(prefix) {
        try {
          const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix));
          return { keys };
        } catch { return { keys: [] }; }
      }
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;



// ── Storage helpers ──────────────────────────────────────────────────────────
const S = {
  async get(key) {
    try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }
    catch { return null; }
  },
  async set(key, val) {
    try { await window.storage.set(key, JSON.stringify(val)); } catch {}
  },
  async list(prefix) {
    try { const r = await window.storage.list(prefix); return r ? r.keys : []; }
    catch { return []; }
  },
  async del(key) {
    try { await window.storage.delete(key); } catch {}
  }
};

// ── Seed default admin ───────────────────────────────────────────────────────
async function seedAdmin() {
  const existing = await S.get("user:admin@careerconnect.edu");
  if (!existing) {
    await S.set("user:admin@careerconnect.edu", {
      email: "admin@careerconnect.edu", password: "admin123",
      role: "admin", name: "Site Administrator", createdAt: new Date().toISOString()
    });
  }
}

// ── Match score ──────────────────────────────────────────────────────────────
function normalizeSkill(s) {
  return s.toLowerCase()
    .replace(/\.js$/i, "")       // react.js → react
    .replace(/\.ts$/i, "")       // typescript.ts → typescript
    .replace(/[\s\-_]+/g, "")   // strip spaces/dashes/underscores
    .replace(/[^a-z0-9]/g, ""); // strip special chars
}

function fuzzySkillMatch(studentSkill, jobSkill) {
  const a = normalizeSkill(studentSkill);
  const b = normalizeSkill(jobSkill);
  if (a === b) return true;
  if (a.includes(b) || b.includes(a)) return true;
  return false;
}

function calcMatch(studentSkills = [], jobSkills = []) {
  if (!jobSkills.length) return { score: 100, matched: [], missing: [] };
  const matched = [];
  const missing = [];
  for (const jobSkill of jobSkills) {
    const hit = studentSkills.some(s => fuzzySkillMatch(s, jobSkill));
    if (hit) matched.push(jobSkill);
    else missing.push(jobSkill);
  }
  const score = Math.round((matched.length / jobSkills.length) * 100);
  return { score, matched, missing };
}

// ── Tiny UI primitives ───────────────────────────────────────────────────────
const css = {
  card: { background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: "1.25rem" },
  btn: { padding: "7px 16px", borderRadius: 8, fontSize: 13, fontWeight: 500, cursor: "pointer", border: "0.5px solid var(--color-border-secondary)", background: "var(--color-background-primary)", color: "var(--color-text-primary)", fontFamily: "var(--font-sans)" },
  btnPrimary: { padding: "7px 16px", borderRadius: 8, fontSize: 13, fontWeight: 500, cursor: "pointer", border: "none", background: "#185FA5", color: "#fff", fontFamily: "var(--font-sans)" },
  btnDanger: { padding: "7px 16px", borderRadius: 8, fontSize: 13, fontWeight: 500, cursor: "pointer", border: "none", background: "#A32D2D", color: "#fff", fontFamily: "var(--font-sans)" },
  input: { width: "100%", padding: "8px 12px", borderRadius: 8, border: "1px solid #d0d0d0", fontSize: 13, background: "#ffffff", color: "#111", fontFamily: "var(--font-sans)", outline: "none", boxSizing: "border-box" },
  label: { display: "block", fontSize: 12, fontWeight: 500, color: "var(--color-text-secondary)", marginBottom: 4 },
  row: { display: "flex", gap: 12, alignItems: "center" },
  col: { display: "flex", flexDirection: "column", gap: 12 },
  badge: (bg, color) => ({ display: "inline-flex", alignItems: "center", gap: 4, padding: "3px 9px", borderRadius: 6, fontSize: 11, fontWeight: 500, background: bg, color }),
};

function Field({ label, children, style }) {
  return <div style={{ marginBottom: 12, ...style }}><label style={css.label}>{label}</label>{children}</div>;
}
function Input({ label, ...props }) {
  return <Field label={label}><input style={css.input} {...props} /></Field>;
}
function Textarea({ label, ...props }) {
  return <Field label={label}><textarea style={{ ...css.input, resize: "vertical", minHeight: 80 }} {...props} /></Field>;
}
function Select({ label, options, ...props }) {
  return (
    <Field label={label}>
      <select style={{ ...css.input }} {...props}>
        {options.map(o => <option key={o.value ?? o} value={o.value ?? o}>{o.label ?? o}</option>)}
      </select>
    </Field>
  );
}
function Modal({ title, onClose, children, width = 500 }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.12)", backdropFilter: "blur(1px)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div style={{ width, maxWidth: "100%", maxHeight: "90vh", overflowY: "auto", position: "relative", background: "#ffffff", border: "1.5px solid #d0d0d0", borderRadius: 14, padding: "1.5rem", boxShadow: "0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 16, fontWeight: 600, color: "#111" }}>{title}</div>
          <button onClick={onClose} style={{ ...css.btn, padding: "4px 10px", background: "#f5f5f5", border: "1px solid #ddd", color: "#444" }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function Toast({ msg, type = "success" }) {
  return msg ? (
    <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 2000, background: type === "error" ? "#A32D2D" : "#0F6E56", color: "#fff", padding: "10px 18px", borderRadius: 8, fontSize: 13, fontWeight: 500, boxShadow: "0 2px 12px rgba(0,0,0,0.18)" }}>{msg}</div>
  ) : null;
}
function Avatar({ name = "?", size = 36, bg = "#B5D4F4", color = "#0C447C" }) {
  const initials = name.split(" ").map(w => w[0]).slice(0, 2).join("").toUpperCase();
  return <div style={{ width: size, height: size, borderRadius: "50%", background: bg, color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.36, fontWeight: 500, flexShrink: 0 }}>{initials}</div>;
}

// ── Sidebar nav ──────────────────────────────────────────────────────────────
function Sidebar({ items, active, setActive, user, onLogout }) {
  return (
    <div style={{ width: 220, background: "var(--color-background-primary)", borderRight: "0.5px solid var(--color-border-tertiary)", display: "flex", flexDirection: "column", minHeight: "100vh", position: "fixed", top: 0, left: 0, bottom: 0 }}>
      <div style={{ padding: "1.25rem", borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 }}>
        <div style={{ fontSize: 15, fontWeight: 500 }}>Career Connect</div>
        <div style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>CUNY Career Portal</div>
      </div>
      <div style={{ flex: 1, overflowY: "auto" }}>
        {items.map(item => (
          <div key={item.id} onClick={() => setActive(item.id)}
            style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 1.25rem", fontSize: 13, cursor: "pointer", color: active === item.id ? "var(--color-text-primary)" : "var(--color-text-secondary)", fontWeight: active === item.id ? 500 : 400, background: active === item.id ? "var(--color-background-secondary)" : "transparent", borderLeft: active === item.id ? "2px solid #185FA5" : "2px solid transparent" }}>
            <span style={{ fontSize: 16 }}>{item.icon}</span>{item.label}
          </div>
        ))}
      </div>
      <div style={{ padding: "1rem 1.25rem", borderTop: "0.5px solid var(--color-border-tertiary)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
          <Avatar name={user.name} size={30} />
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.name}</div>
            <div style={{ fontSize: 10, color: "var(--color-text-tertiary)" }}>{user.role}</div>
          </div>
        </div>
        <button onClick={onLogout} style={{ ...css.btn, width: "100%", fontSize: 12 }}>Sign out</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// AUTH SCREENS
// ═══════════════════════════════════════════════════════════════════════════════
function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState("login"); // login | register
  const [role, setRole] = useState("student");
  const [form, setForm] = useState({ email: "", password: "", name: "", companyName: "", industry: "", website: "" });
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  async function handleLogin() {
    setLoading(true); setErr("");
    const user = await S.get(`user:${form.email}`);
    if (!user || user.password !== form.password) { setErr("Invalid email or password."); setLoading(false); return; }
    onLogin(user);
    setLoading(false);
  }

  async function handleRegister() {
    setLoading(true); setErr("");
    if (!form.email || !form.password || !form.name) { setErr("Please fill all required fields."); setLoading(false); return; }
    const existing = await S.get(`user:${form.email}`);
    if (existing) { setErr("Email already registered."); setLoading(false); return; }
    const user = {
      email: form.email, password: form.password, name: form.name,
      role, createdAt: new Date().toISOString(),
      ...(role === "employer" ? { companyName: form.companyName, industry: form.industry, website: form.website, approved: false } : {}),
      ...(role === "student" ? { major: "", gpa: "", graduationYear: "", skills: [], bio: "", resumeFileName: "", resumeData: "", kanban: { applied: [], reviewing: [], interviewing: [], closed: [] } } : {})
    };
    await S.set(`user:${form.email}`, user);
    if (role === "student") onLogin(user);
    else if (role === "employer") { setErr(""); setMode("pending"); }
    setLoading(false);
  }

  if (mode === "pending") return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--color-background-tertiary)" }}>
      <div style={{ ...css.card, width: 420, textAlign: "center" }}>
        <div style={{ fontSize: 32, marginBottom: 12 }}>⏳</div>
        <div style={{ fontSize: 16, fontWeight: 500, marginBottom: 8 }}>Account pending approval</div>
        <div style={{ fontSize: 13, color: "var(--color-text-secondary)", marginBottom: 16 }}>Your employer account is awaiting approval from a site administrator. You'll be able to log in once approved.</div>
        <button style={css.btnPrimary} onClick={() => { setMode("login"); setRole("student"); }}>Back to login</button>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--color-background-tertiary)", padding: 16 }}>
      <div style={{ ...css.card, width: 440, maxWidth: "100%" }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 22, fontWeight: 500 }}>Career Connect</div>
          <div style={{ fontSize: 12, color: "var(--color-text-tertiary)" }}>CUNY Career Development Portal</div>
        </div>
        <div style={{ display: "flex", borderRadius: 8, overflow: "hidden", border: "0.5px solid var(--color-border-tertiary)", marginBottom: 20 }}>
          {["login", "register"].map(m => (
            <div key={m} onClick={() => setMode(m)} style={{ flex: 1, textAlign: "center", padding: "8px", fontSize: 13, fontWeight: 500, cursor: "pointer", background: mode === m ? "#185FA5" : "transparent", color: mode === m ? "#fff" : "var(--color-text-secondary)" }}>{m === "login" ? "Sign in" : "Register"}</div>
          ))}
        </div>
        {mode === "register" && (
          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            {["student", "employer"].map(r => (
              <div key={r} onClick={() => setRole(r)} style={{ flex: 1, textAlign: "center", padding: "7px", fontSize: 12, fontWeight: 500, cursor: "pointer", borderRadius: 8, border: `0.5px solid ${role === r ? "#185FA5" : "var(--color-border-secondary)"}`, background: role === r ? "#E6F1FB" : "transparent", color: role === r ? "#185FA5" : "var(--color-text-secondary)" }}>
                {r === "student" ? "🎓 Student" : "🏢 Employer"}
              </div>
            ))}
          </div>
        )}
        <div style={css.col}>
          {mode === "register" && <Input label="Full Name *" value={form.name} onChange={set("name")} placeholder="Jane Smith" />}
          {mode === "register" && role === "employer" && <>
            <Input label="Company Name *" value={form.companyName} onChange={set("companyName")} placeholder="Acme Corp" />
            <Input label="Industry" value={form.industry} onChange={set("industry")} placeholder="Technology" />
            <Input label="Website" value={form.website} onChange={set("website")} placeholder="https://acme.com" />
          </>}
          <Input label="Email *" type="email" value={form.email} onChange={set("email")} placeholder="your@email.com" />
          <Input label="Password *" type="password" value={form.password} onChange={set("password")} placeholder="••••••••" />
        </div>
        {err && <div style={{ fontSize: 12, color: "#A32D2D", marginTop: 8, padding: "8px 12px", background: "#FCEBEB", borderRadius: 6 }}>{err}</div>}
        <button style={{ ...css.btnPrimary, width: "100%", marginTop: 16, padding: 10 }} onClick={mode === "login" ? handleLogin : handleRegister} disabled={loading}>
          {loading ? "Please wait…" : mode === "login" ? "Sign in" : "Create account"}
        </button>
        {mode === "login" && <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", textAlign: "center", marginTop: 8 }}>Admin demo: admin@careerconnect.edu / admin123</div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// STUDENT VIEWS
// ═══════════════════════════════════════════════════════════════════════════════
function StudentDashboard({ user, setUser, toast }) {
  const [tab, setTab] = useState("dashboard");
  const [jobs, setJobs] = useState([]);
  const [refresh, setRefresh] = useState(0);

  useEffect(() => {
    (async () => {
      const keys = await S.list("job:");
      const all = await Promise.all(keys.map(k => S.get(k)));
      setJobs(all.filter(Boolean).filter(j => j.status === "active"));
    })();
  }, [refresh]);

  const navItems = [
    { id: "dashboard", icon: "🏠", label: "Dashboard" },
    { id: "profile", icon: "👤", label: "My Profile" },
    { id: "resume", icon: "📄", label: "Documents" },
    { id: "jobs", icon: "🔍", label: "Browse Jobs" },
    { id: "applications", icon: "📋", label: "Applications" },
    { id: "help", icon: "❓", label: "Help & Tutorials" },
  ];

  async function updateUser(updates) {
    const updated = { ...user, ...updates };
    await S.set(`user:${user.email}`, updated);
    setUser(updated);
  }

  const views = { dashboard: <StuDashboardHome user={user} jobs={jobs} />, profile: <StuProfile user={user} updateUser={updateUser} toast={toast} jobs={jobs} />, resume: <StuResume user={user} updateUser={updateUser} toast={toast} />, jobs: <StuJobs user={user} jobs={jobs} updateUser={updateUser} toast={toast} refresh={() => setRefresh(r => r + 1)} />, applications: <StuKanban user={user} updateUser={updateUser} jobs={jobs} toast={toast} />, help: <StuHelp /> };

  return (
    <div style={{ display: "flex" }}>
      <Sidebar items={navItems} active={tab} setActive={setTab} user={user} onLogout={() => setUser(null)} />
      <div style={{ marginLeft: 220, flex: 1, padding: "2rem", minHeight: "100vh", background: "var(--color-background-tertiary)" }}>{views[tab]}</div>
    </div>
  );
}

function StuDashboardHome({ user, jobs }) {
  const skills = user.skills || [];
  const kanban = user.kanban || { applied: [], reviewing: [], interviewing: [], closed: [] };
  const totalApps = kanban.applied.length + kanban.reviewing.length + kanban.interviewing.length + kanban.closed.length;
  const topMatches = jobs.map(j => ({ ...j, ...calcMatch(skills, j.skills || []) })).sort((a, b) => b.score - a.score).slice(0, 3);

  return (
    <div>
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 20, fontWeight: 500 }}>Good morning, {user.name.split(" ")[0]} 👋</div>
        <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginTop: 2 }}>{user.major || "Update your profile to get started"}</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 24 }}>
        {[{ label: "Profile Completion", value: profilePct(user) + "%", badge: profilePct(user) < 80 ? "⚠ Incomplete" : "✓ Complete", badgeBg: profilePct(user) < 80 ? "#FAEEDA" : "#EAF3DE", badgeColor: profilePct(user) < 80 ? "#854F0B" : "#3B6D11" },
          { label: "Applications Sent", value: totalApps, badge: `${kanban.interviewing.length} interviewing`, badgeBg: "#E6F1FB", badgeColor: "#185FA5" },
          { label: "Job Matches", value: jobs.length, badge: `${topMatches.filter(j => j.score >= 80).length} high fit`, badgeBg: "#EAF3DE", badgeColor: "#3B6D11" }].map(s => (
          <div key={s.label} style={css.card}>
            <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginBottom: 4 }}>{s.label}</div>
            <div style={{ fontSize: 26, fontWeight: 500, marginBottom: 4 }}>{s.value}</div>
            <span style={css.badge(s.badgeBg, s.badgeColor)}>{s.badge}</span>
          </div>
        ))}
      </div>
      <div style={{ ...css.card, marginBottom: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 12 }}>Top job matches</div>
        {topMatches.length === 0 ? <div style={{ fontSize: 13, color: "var(--color-text-tertiary)" }}>No active jobs yet. Check back soon!</div> :
          topMatches.map(j => <MatchRow key={j.id} job={j} score={j.score} matched={j.matched} missing={j.missing} />)}
      </div>
    </div>
  );
}

function profilePct(user) {
  let score = 0;
  if (user.name) score += 20;
  if (user.major) score += 15;
  if (user.bio) score += 15;
  if ((user.skills || []).length > 0) score += 20;
  if (user.resumeFileName) score += 20;
  if (user.graduationYear) score += 10;
  return Math.min(score, 100);
}

function MatchRow({ job, score, matched = [], missing = [] }) {
  const [showBreakdown, setShowBreakdown] = useState(false);
  const barColor = score >= 80 ? "#185FA5" : score >= 50 ? "#EF9F27" : "#E24B4A";
  const label = score >= 80 ? "High Alignment" : score >= 50 ? "Moderate" : "Low Alignment";
  return (
    <div style={{ padding: "10px 0", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ width: 38, height: 38, borderRadius: 8, background: "var(--color-background-secondary)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 600, color: "var(--color-text-secondary)", flexShrink: 0 }}>{(job.company || "?").slice(0, 2).toUpperCase()}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 500 }}>{job.title}</div>
          <div style={{ fontSize: 11, color: "var(--color-text-secondary)" }}>{job.company} · {job.location}</div>
          <div style={{ background: "var(--color-background-secondary)", borderRadius: 3, height: 4, margin: "6px 0 2px" }}><div style={{ width: score + "%", height: 4, borderRadius: 3, background: barColor }} /></div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ fontSize: 11, color: barColor, fontWeight: 500 }}>{score}% · {label}</div>
            {(matched.length > 0 || missing.length > 0) && (
              <button onClick={() => setShowBreakdown(v => !v)} style={{ fontSize: 10, color: "#185FA5", background: "none", border: "none", cursor: "pointer", padding: 0, textDecoration: "underline" }}>
                {showBreakdown ? "Hide" : "Details"}
              </button>
            )}
          </div>
        </div>
      </div>
      {showBreakdown && (
        <div style={{ marginTop: 8, marginLeft: 50, display: "flex", gap: 16 }}>
          {matched.length > 0 && <div><div style={{ fontSize: 10, fontWeight: 600, color: "#3B6D11", marginBottom: 3 }}>✓ You have</div><div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>{matched.map(s => <span key={s} style={{ ...css.badge("#EAF3DE", "#3B6D11"), fontSize: 10 }}>{s}</span>)}</div></div>}
          {missing.length > 0 && <div><div style={{ fontSize: 10, fontWeight: 600, color: "#A32D2D", marginBottom: 3 }}>✕ Missing</div><div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>{missing.map(s => <span key={s} style={{ ...css.badge("#FCEBEB", "#A32D2D"), fontSize: 10 }}>{s}</span>)}</div></div>}
        </div>
      )}
    </div>
  );
}

function StuProfile({ user, updateUser, toast, jobs = [] }) {
  const [form, setForm] = useState({ name: user.name || "", major: user.major || "", gpa: user.gpa || "", graduationYear: user.graduationYear || "", bio: user.bio || "", skillsRaw: (user.skills || []).join(", ") });
  const [showLinkedIn, setShowLinkedIn] = useState(false);
  const [pastedText, setPastedText] = useState("");
  const [parsing, setParsing] = useState(false);
  const [parsed, setParsed] = useState(null); // extracted result for preview
  const [parseError, setParseError] = useState("");
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  async function save() {
    await updateUser({ ...form, skills: form.skillsRaw.split(",").map(s => s.trim()).filter(Boolean) });
    toast("Profile saved!");
  }

  async function parseWithClaude() {
    if (!pastedText.trim()) { setParseError("Please paste your LinkedIn profile text first."); return; }
    setParsing(true); setParseError(""); setParsed(null);
    try {
      const response = await fetch("round-bread-0766.justin-liu1130.workers.dev", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `You are a LinkedIn profile parser. Extract structured information from the following pasted LinkedIn profile text and return ONLY a valid JSON object with no markdown, no backticks, no explanation.

Extract these fields (use empty string or empty array if not found):
- name (string): Full name
- headline (string): Job title or student headline
- bio (string): About/summary section, cleaned up
- skills (array of strings): All skills mentioned anywhere in the text
- graduationYear (string): Graduation year if mentioned (4-digit year only)
- major (string): Field of study or major if mentioned

LinkedIn profile text:
${pastedText}`
          }]
        })
      });
      const data = await response.json();
      const raw = data.content?.map(b => b.text || "").join("").trim();
      const clean = raw.replace(/```json|```/g, "").trim();
      const result = JSON.parse(clean);
      setParsed(result);
    } catch (e) {
      setParseError("Could not parse the profile. Try pasting more of your LinkedIn page content.");
    }
    setParsing(false);
  }

  function applyParsed() {
    if (!parsed) return;
    const existingSkills = form.skillsRaw.split(",").map(s => s.trim()).filter(Boolean);
    const newSkills = parsed.skills || [];
    const merged = [...new Set([...existingSkills, ...newSkills])];
    setForm(f => ({
      ...f,
      name: parsed.name || f.name,
      bio: parsed.bio || f.bio,
      major: parsed.major || f.major,
      graduationYear: parsed.graduationYear || f.graduationYear,
      skillsRaw: merged.join(", "),
    }));
    setShowLinkedIn(false);
    setPastedText(""); setParsed(null);
    toast("LinkedIn profile imported! Review your details and save.");
  }

  function closeLinkedIn() {
    setShowLinkedIn(false);
    setPastedText(""); setParsed(null); setParseError("");
  }

  return (
    <div style={{ maxWidth: 600 }}>
      <div style={{ fontSize: 18, fontWeight: 500, marginBottom: 20 }}>My profile</div>
      <div style={css.card}>
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 20 }}>
          <Avatar name={user.name} size={56} />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 15, fontWeight: 500 }}>{user.name}</div>
            <div style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>{user.email}</div>
            <div style={{ marginTop: 4 }}><span style={css.badge("#E6F1FB", "#185FA5")}>🎓 Student</span></div>
          </div>
          <button style={{ ...css.btn, display: "flex", alignItems: "center", gap: 6, fontSize: 12, border: "1px solid #0A66C2", color: "#0A66C2", background: "#EBF4FF" }} onClick={() => setShowLinkedIn(true)}>
            <span style={{ fontWeight: 700, fontSize: 14 }}>in</span> Import via LinkedIn
          </button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Input label="Full Name" value={form.name} onChange={set("name")} />
          <Input label="Major / Program" value={form.major} onChange={set("major")} placeholder="Computer Science" />
          <Input label="GPA" value={form.gpa} onChange={set("gpa")} placeholder="3.5" />
          <Input label="Graduation Year" value={form.graduationYear} onChange={set("graduationYear")} placeholder="2026" />
        </div>
        <Textarea label="Bio / Summary" value={form.bio} onChange={set("bio")} placeholder="Tell employers about yourself..." />
        <Input label="Skills (comma-separated)" value={form.skillsRaw} onChange={set("skillsRaw")} placeholder="Python, React, SQL, Data Analysis" />
        <div style={{ marginTop: 6, display: "flex", flexWrap: "wrap", gap: 6 }}>
          {form.skillsRaw.split(",").map(s => s.trim()).filter(Boolean).map(s => <span key={s} style={css.badge("#E6F1FB", "#185FA5")}>{s}</span>)}
        </div>
        <button style={{ ...css.btnPrimary, marginTop: 16 }} onClick={save}>Save profile</button>
      </div>

      {/* In-demand skills from active jobs */}
      {(() => {
        const currentSkills = form.skillsRaw.split(",").map(s => s.trim().toLowerCase()).filter(Boolean);
        const missingFreq = {};
        jobs.forEach(j => {
          (j.skills || []).forEach(s => {
            if (!currentSkills.some(cs => fuzzySkillMatch(cs, s))) {
              missingFreq[s] = (missingFreq[s] || 0) + 1;
            }
          });
        });
        const suggestions = Object.entries(missingFreq).sort((a, b) => b[1] - a[1]).slice(0, 10);
        if (suggestions.length === 0) return null;
        return (
          <div style={{ ...css.card, marginTop: 14, background: "#FFFBEA", border: "1px solid #F5D76E" }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: "#7A5F00", marginBottom: 8 }}>💡 Skills employers are looking for that you don't have yet:</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {suggestions.map(([skill, count]) => (
                <button key={skill}
                  onClick={() => {
                    const existing = form.skillsRaw.split(",").map(s => s.trim()).filter(Boolean);
                    if (!existing.map(s => s.toLowerCase()).includes(skill.toLowerCase())) {
                      setForm(f => ({ ...f, skillsRaw: [...existing, skill].join(", ") }));
                      toast(`"${skill}" added — remember to save your profile!`);
                    }
                  }}
                  style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 500, cursor: "pointer", border: "1px solid #D4A900", background: "#FFFDE6", color: "#7A5F00", fontFamily: "var(--font-sans)" }}>
                  + {skill} <span style={{ opacity: 0.6, fontSize: 10 }}>({count} job{count > 1 ? "s" : ""})</span>
                </button>
              ))}
            </div>
            <div style={{ fontSize: 10, color: "#A08000", marginTop: 8 }}>Click to add to your skills list, then hit Save profile.</div>
          </div>
        );
      })()}

      {showLinkedIn && (
        <Modal title="Import via LinkedIn" onClose={closeLinkedIn} width={540}>
          {/* Step-by-step instructions */}
          <div style={{ background: "#EBF4FF", border: "1px solid #B0D4F5", borderRadius: 8, padding: "12px 14px", marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: "#0C447C", marginBottom: 6 }}>How to copy your LinkedIn profile:</div>
            <ol style={{ fontSize: 12, color: "#185FA5", paddingLeft: 16, margin: 0, lineHeight: 2 }}>
              <li>Open your LinkedIn profile in a browser</li>
              <li>Select all text on the page (<strong>Ctrl+A</strong> / <strong>Cmd+A</strong>)</li>
              <li>Copy it (<strong>Ctrl+C</strong> / <strong>Cmd+C</strong>)</li>
              <li>Paste it into the box below</li>
            </ol>
          </div>

          <div style={{ marginBottom: 12 }}>
            <label style={css.label}>Paste your LinkedIn profile text *</label>
            <textarea
              style={{ ...css.input, minHeight: 160, resize: "vertical", background: "#fff", border: "1px solid #ccc" }}
              placeholder="Paste everything from your LinkedIn profile page here — name, headline, about, experience, skills, education…"
              value={pastedText}
              onChange={e => { setPastedText(e.target.value); setParsed(null); setParseError(""); }}
            />
          </div>

          {parseError && (
            <div style={{ fontSize: 12, color: "#A32D2D", background: "#FCEBEB", border: "1px solid #E88080", borderRadius: 6, padding: "8px 12px", marginBottom: 12 }}>{parseError}</div>
          )}

          {/* Parsed preview */}
          {parsed && (
            <div style={{ background: "#F6FFF0", border: "1px solid #7AB648", borderRadius: 8, padding: "12px 14px", marginBottom: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: "#3B6D11", marginBottom: 10 }}>✓ Extracted — review before applying:</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontSize: 12 }}>
                {parsed.name && <div><span style={{ color: "#5F5E5A" }}>Name:</span> <strong>{parsed.name}</strong></div>}
                {parsed.major && <div><span style={{ color: "#5F5E5A" }}>Major:</span> <strong>{parsed.major}</strong></div>}
                {parsed.graduationYear && <div><span style={{ color: "#5F5E5A" }}>Grad Year:</span> <strong>{parsed.graduationYear}</strong></div>}
                {parsed.headline && <div style={{ gridColumn: "1/-1" }}><span style={{ color: "#5F5E5A" }}>Headline:</span> <strong>{parsed.headline}</strong></div>}
              </div>
              {parsed.bio && <div style={{ fontSize: 12, marginTop: 8 }}><span style={{ color: "#5F5E5A" }}>Bio:</span> {parsed.bio.slice(0, 120)}{parsed.bio.length > 120 ? "…" : ""}</div>}
              {(parsed.skills || []).length > 0 && (
                <div style={{ marginTop: 8 }}>
                  <div style={{ fontSize: 11, color: "#5F5E5A", marginBottom: 4 }}>Skills found ({parsed.skills.length}):</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {parsed.skills.map(s => <span key={s} style={css.badge("#EAF3DE", "#3B6D11")}>{s}</span>)}
                  </div>
                </div>
              )}
            </div>
          )}

          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
            <button style={css.btn} onClick={closeLinkedIn}>Cancel</button>
            {!parsed ? (
              <button
                style={{ ...css.btnPrimary, background: parsing ? "#6B9FC7" : "#0A66C2", display: "flex", alignItems: "center", gap: 8 }}
                onClick={parseWithClaude}
                disabled={parsing}>
                {parsing ? (
                  <><span style={{ display: "inline-block", width: 12, height: 12, border: "2px solid #fff", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} /> Extracting…</>
                ) : (
                  <><span style={{ fontWeight: 700 }}>in</span> Extract profile data</>
                )}
              </button>
            ) : (
              <button style={{ ...css.btnPrimary, background: "#0A66C2" }} onClick={applyParsed}>Apply to my profile</button>
            )}
          </div>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </Modal>
      )}
    </div>
  );
}

function StuResume({ user, updateUser, toast }) {
  const resumes = user.resumes || (user.resumeFileName ? [{ id: "legacy", fileName: user.resumeFileName, data: user.resumeData, uploadedAt: user.resumeUploadedAt, primary: true }] : []);
  const primaryId = resumes.find(r => r.primary)?.id || resumes[0]?.id || null;

  async function saveResumes(list) {
    await updateUser({ resumes: list, resumeFileName: list.find(r => r.primary)?.fileName || "", resumeData: list.find(r => r.primary)?.data || "" });
  }

  function handleFile(e) {
    const file = e.target.files[0];
    e.target.value = "";
    if (!file) return;
    if (file.type !== "application/pdf") { toast("Please upload a PDF file.", "error"); return; }
    if (resumes.length >= 5) { toast("Maximum 5 resumes allowed.", "error"); return; }
    const reader = new FileReader();
    reader.onload = async ev => {
      const isFirst = resumes.length === 0;
      const newResume = { id: "r" + Date.now(), fileName: file.name, data: ev.target.result, uploadedAt: new Date().toISOString(), primary: isFirst };
      const updated = [...resumes, newResume];
      await saveResumes(updated);
      toast(`${file.name} uploaded${isFirst ? " and set as primary!" : "!"}`);
    };
    reader.readAsDataURL(file);
  }

  async function setPrimary(id) {
    const updated = resumes.map(r => ({ ...r, primary: r.id === id }));
    await saveResumes(updated);
    toast("Primary resume updated!");
  }

  async function deleteResume(id) {
    let updated = resumes.filter(r => r.id !== id);
    if (updated.length > 0 && !updated.find(r => r.primary)) updated[0].primary = true;
    await saveResumes(updated);
    toast("Resume removed.");
  }

  return (
    <div style={{ maxWidth: 640 }}>
      <div style={{ fontSize: 18, fontWeight: 500, marginBottom: 4 }}>Documents</div>
      <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 20 }}>Upload up to 5 resumes tailored for different roles. The <strong>Primary</strong> resume powers your Match Score and is sent with applications.</div>

      <div style={css.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 500 }}>My resumes ({resumes.length}/5)</div>
          <label style={{ ...css.btnPrimary, display: "inline-block", cursor: "pointer", fontSize: 12 }}>
            + Upload PDF
            <input type="file" accept=".pdf" style={{ display: "none" }} onChange={handleFile} />
          </label>
        </div>

        {resumes.length === 0 && (
          <div style={{ padding: "32px", textAlign: "center", border: "1px dashed #ccc", borderRadius: 8 }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>📤</div>
            <div style={{ fontSize: 13, color: "var(--color-text-secondary)" }}>No resumes uploaded yet. Upload a PDF to get started.</div>
          </div>
        )}

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {resumes.map(r => (
            <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 10, border: r.primary ? "1.5px solid #378ADD" : "1px solid #ddd", background: r.primary ? "#EBF4FF" : "#fafafa" }}>
              <div style={{ fontSize: 26 }}>📄</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 500, color: r.primary ? "#0C447C" : "#111", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.fileName}</div>
                <div style={{ fontSize: 11, color: r.primary ? "#185FA5" : "var(--color-text-tertiary)" }}>
                  Uploaded {new Date(r.uploadedAt).toLocaleDateString()}
                  {r.primary && " · ⭐ Primary — used for Match Score"}
                </div>
              </div>
              <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                {!r.primary && (
                  <button style={{ ...css.btn, fontSize: 11, padding: "4px 9px", background: "#EBF4FF", border: "1px solid #378ADD", color: "#185FA5" }} onClick={() => setPrimary(r.id)}>Set Primary</button>
                )}
                {r.primary && (
                  <span style={css.badge("#EBF4FF", "#185FA5")}>⭐ Primary</span>
                )}
                {r.data && (
                  <a href={r.data} download={r.fileName} style={{ ...css.btn, fontSize: 11, padding: "4px 9px", textDecoration: "none" }}>Download</a>
                )}
                <button style={{ ...css.btn, fontSize: 11, padding: "4px 9px", color: "#A32D2D", border: "1px solid #E88080" }} onClick={() => deleteResume(r.id)}>Remove</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function StuJobs({ user, jobs, updateUser, toast }) {
  const [query, setQuery] = useState("");
  const [applying, setApplying] = useState(null);
  const [coverLetter, setCoverLetter] = useState("");
  const [filter, setFilter] = useState("all"); // all | high | moderate | low

  const skills = user.skills || [];
  const kanban = user.kanban || { applied: [], reviewing: [], interviewing: [], closed: [], denied: [] };
  const appliedIds = [...(kanban.applied||[]), ...(kanban.reviewing||[]), ...(kanban.interviewing||[]), ...(kanban.closed||[]), ...(kanban.denied||[])].map(a => a.jobId);

  // Compute match for every job
  const scoredJobs = jobs.map(j => {
    const { score, matched, missing } = calcMatch(skills, j.skills || []);
    return { ...j, score, matched, missing };
  }).sort((a, b) => b.score - a.score);

  // Skill suggestions: top missing skills across ALL active jobs
  const missingFreq = {};
  scoredJobs.forEach(j => j.missing.forEach(s => { missingFreq[s] = (missingFreq[s] || 0) + 1; }));
  const suggestedSkills = Object.entries(missingFreq).sort((a, b) => b[1] - a[1]).slice(0, 8).map(([s, count]) => ({ skill: s, count }));

  const filtered = scoredJobs.filter(j => {
    const matchesQuery = !query || j.title.toLowerCase().includes(query.toLowerCase()) || (j.company || "").toLowerCase().includes(query.toLowerCase());
    const matchesTier = filter === "all" || (filter === "high" && j.score >= 80) || (filter === "moderate" && j.score >= 50 && j.score < 80) || (filter === "low" && j.score < 50);
    return matchesQuery && matchesTier;
  });

  async function apply() {
    if (!user.resumeFileName) { toast("Please upload a resume first.", "error"); return; }
    const k = user.kanban || { applied: [], reviewing: [], interviewing: [], closed: [], denied: [] };
    k.applied = [...(k.applied||[]), { jobId: applying.id, appliedAt: new Date().toISOString(), coverLetter, title: applying.title, company: applying.company }];
    await updateUser({ kanban: k });
    setApplying(null); setCoverLetter("");
    toast(`Applied to ${applying.title}!`);
  }

  function addSkill(skill) {
    const existing = skills.map(s => s.toLowerCase());
    if (existing.includes(skill.toLowerCase())) { toast(`"${skill}" is already in your profile.`); return; }
    updateUser({ skills: [...skills, skill] });
    toast(`"${skill}" added to your profile!`);
  }

  return (
    <div>
      <div style={{ fontSize: 18, fontWeight: 500, marginBottom: 16 }}>Browse jobs</div>

      {/* Skill suggestions banner */}
      {suggestedSkills.length > 0 && (
        <div style={{ ...css.card, marginBottom: 16, background: "#FFFBEA", border: "1px solid #F5D76E" }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: "#7A5F00", marginBottom: 8 }}>
            💡 Skills in demand — add these to boost your match scores:
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {suggestedSkills.map(({ skill, count }) => (
              <button key={skill} onClick={() => addSkill(skill)}
                style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 500, cursor: "pointer", border: "1px solid #D4A900", background: "#FFFDE6", color: "#7A5F00", fontFamily: "var(--font-sans)" }}>
                + {skill} <span style={{ opacity: 0.6, fontSize: 10 }}>({count} job{count > 1 ? "s" : ""})</span>
              </button>
            ))}
          </div>
          <div style={{ fontSize: 10, color: "#A08000", marginTop: 8 }}>Click a skill to instantly add it to your profile.</div>
        </div>
      )}

      {/* Search + filter row */}
      <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
        <input style={{ ...css.input, flex: 1 }} placeholder="Search by title or company…" value={query} onChange={e => setQuery(e.target.value)} />
        <div style={{ display: "flex", gap: 4 }}>
          {[["all","All"],["high","🔵 High"],["moderate","🟡 Moderate"],["low","🔴 Low"]].map(([val, lbl]) => (
            <button key={val} onClick={() => setFilter(val)}
              style={{ ...css.btn, fontSize: 11, padding: "6px 10px", background: filter === val ? "#185FA5" : undefined, color: filter === val ? "#fff" : undefined, border: filter === val ? "none" : undefined }}>
              {lbl}
            </button>
          ))}
        </div>
      </div>

      {filtered.length === 0 && <div style={{ fontSize: 13, color: "var(--color-text-tertiary)", textAlign: "center", padding: 40 }}>No jobs match your filters.</div>}

      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {filtered.map(j => {
          const already = appliedIds.includes(j.id);
          const barColor = j.score >= 80 ? "#185FA5" : j.score >= 50 ? "#EF9F27" : "#E24B4A";
          const tier = j.score >= 80 ? "High Alignment" : j.score >= 50 ? "Moderate Alignment" : "Low Alignment";
          return (
            <div key={j.id} style={{ ...css.card, borderLeft: `3px solid ${barColor}` }}>
              <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                <div style={{ width: 42, height: 42, borderRadius: 8, background: "var(--color-background-secondary)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 600, flexShrink: 0 }}>{(j.company || "?").slice(0, 2).toUpperCase()}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 500 }}>{j.title}</div>
                  <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 6 }}>{j.company} · {j.location} · {j.type}{j.deadline ? ` · Deadline: ${j.deadline}` : ""}</div>
                  <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 8 }}>{j.description}</div>

                  {/* Match bar */}
                  <div style={{ background: "#eee", borderRadius: 3, height: 5, marginBottom: 4 }}>
                    <div style={{ width: j.score + "%", height: 5, borderRadius: 3, background: barColor, transition: "width 0.4s" }} />
                  </div>
                  <div style={{ fontSize: 11, color: barColor, fontWeight: 600, marginBottom: 8 }}>{j.score}% match · {tier}</div>

                  {/* Skills breakdown */}
                  {(j.skills || []).length > 0 && (
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 4 }}>
                      {j.matched.map(s => (
                        <span key={s} style={{ ...css.badge("#EAF3DE", "#3B6D11"), fontSize: 10 }}>✓ {s}</span>
                      ))}
                      {j.missing.map(s => (
                        <button key={s} onClick={() => addSkill(s)}
                          title={`Add "${s}" to your profile`}
                          style={{ display: "inline-flex", alignItems: "center", gap: 3, padding: "3px 8px", borderRadius: 6, fontSize: 10, fontWeight: 500, cursor: "pointer", border: "1px dashed #E24B4A", background: "#FFF5F5", color: "#A32D2D", fontFamily: "var(--font-sans)" }}>
                          + {s}
                        </button>
                      ))}
                    </div>
                  )}
                  {j.missing.length > 0 && (
                    <div style={{ fontSize: 10, color: "var(--color-text-tertiary)", marginTop: 2 }}>
                      Click a red skill to add it to your profile and raise your match score.
                    </div>
                  )}
                </div>
                <div style={{ flexShrink: 0 }}>
                  {already
                    ? <span style={css.badge("#EAF3DE", "#3B6D11")}>✓ Applied</span>
                    : <button style={css.btnPrimary} onClick={() => { setApplying(j); setCoverLetter(""); }}>Apply</button>}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {applying && (
        <Modal title={`Apply — ${applying.title}`} onClose={() => setApplying(null)}>
          <div style={{ fontSize: 13, color: "var(--color-text-secondary)", marginBottom: 8 }}>{applying.company} · {applying.location}</div>
          <div style={{ fontSize: 12, marginBottom: 4, padding: "8px 10px", background: "#EBF4FF", borderRadius: 6 }}>
            📄 Resume: <strong>{user.resumeFileName || "No resume uploaded"}</strong>
            {applying.score !== undefined && <span style={{ marginLeft: 8, color: applying.score >= 80 ? "#3B6D11" : applying.score >= 50 ? "#854F0B" : "#A32D2D", fontWeight: 600 }}>· {applying.score}% match</span>}
          </div>
          {applying.missing?.length > 0 && (
            <div style={{ fontSize: 12, padding: "8px 10px", background: "#FFF5F5", borderRadius: 6, border: "1px solid #F5CCCC", marginBottom: 8, color: "#A32D2D" }}>
              Consider mentioning these skills in your cover letter: <strong>{applying.missing.join(", ")}</strong>
            </div>
          )}
          <Textarea label="Cover letter (optional)" value={coverLetter} onChange={e => setCoverLetter(e.target.value)} placeholder="Tell this employer why you're a great fit…" />
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 8 }}>
            <button style={css.btn} onClick={() => setApplying(null)}>Cancel</button>
            <button style={css.btnPrimary} onClick={apply}>Submit application</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function StuKanban({ user, updateUser, jobs, toast }) {
  const kanban = user.kanban || { applied: [], reviewing: [], interviewing: [], closed: [], denied: [] };

  const cols = [
    { id: "applied",      label: "Applied",        color: "#185FA5", bg: "#E6F1FB",  icon: "📨", desc: "Your application has been submitted and is awaiting employer review." },
    { id: "reviewing",    label: "Reviewing",       color: "#854F0B", bg: "#FEF3E2",  icon: "🔍", desc: "The employer has viewed your profile and is considering your application." },
    { id: "interviewing", label: "Interviewing",    color: "#3B6D11", bg: "#EAF3DE",  icon: "🗓", desc: "You've been selected for an interview. Expect the employer to reach out." },
    { id: "closed",       label: "Offer / Closed",  color: "#185FA5", bg: "#E6F1FB",  icon: "🎉", desc: "The employer has extended an offer or closed this position." },
    { id: "denied",       label: "Not Selected",    color: "#A32D2D", bg: "#FCEBEB",  icon: "✕",  desc: "The employer has decided to move forward with other candidates." },
  ];

  async function withdraw(card, colId) {
    const k = { ...kanban };
    k[colId] = (k[colId] || []).filter(c => c.jobId !== card.jobId);
    await updateUser({ kanban: k });
    toast("Application withdrawn.");
  }

  const allCards = cols.flatMap(col =>
    (kanban[col.id] || []).map(card => ({ ...card, colId: col.id, col }))
  );

  return (
    <div>
      <div style={{ fontSize: 18, fontWeight: 500, marginBottom: 4 }}>Application tracker</div>
      <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 20 }}>
        Status is updated by the employer. You can withdraw an application at any time.
      </div>

      {/* Column headers */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 10, marginBottom: 10 }}>
        {cols.map(col => {
          const count = (kanban[col.id] || []).length;
          return (
            <div key={col.id} style={{ background: col.bg, borderRadius: 8, padding: "10px 10px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: col.color, textTransform: "uppercase", letterSpacing: "0.05em" }}>{col.icon} {col.label}</div>
                <span style={{ ...css.badge("rgba(0,0,0,0.08)", col.color), fontSize: 10 }}>{count}</span>
              </div>
              <div style={{ fontSize: 10, color: col.color, opacity: 0.8, lineHeight: 1.4 }}>{col.desc}</div>
            </div>
          );
        })}
      </div>

      {/* Cards */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 10, alignItems: "start" }}>
        {cols.map(col => (
          <div key={col.id} style={{ display: "flex", flexDirection: "column", gap: 8, minHeight: 100 }}>
            {(kanban[col.id] || []).map(card => (
              <div key={card.jobId} style={{ background: "#fff", border: `1.5px solid ${col.color}22`, borderLeft: `3px solid ${col.color}`, borderRadius: 8, padding: "10px 10px 8px" }}>
                <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 2, color: "#111" }}>{card.title}</div>
                <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginBottom: 2 }}>{card.company}</div>
                <div style={{ fontSize: 10, color: "var(--color-text-tertiary)", marginBottom: 8 }}>Applied {new Date(card.appliedAt).toLocaleDateString()}</div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ ...css.badge(col.bg, col.color), fontSize: 10 }}>{col.label}</span>
                  {col.id !== "denied" && (
                    <button
                      onClick={() => withdraw(card, col.id)}
                      style={{ fontSize: 10, padding: "2px 7px", borderRadius: 5, border: "1px solid #ddd", background: "#fafafa", color: "#888", cursor: "pointer", fontFamily: "var(--font-sans)" }}
                      title="Withdraw application">
                      Withdraw
                    </button>
                  )}
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>

      {allCards.length === 0 && (
        <div style={{ textAlign: "center", padding: "48px 0", color: "var(--color-text-tertiary)", fontSize: 13 }}>
          No applications yet. Browse jobs to get started!
        </div>
      )}
    </div>
  );
}

function EmpApplicants({ user, jobs, toast }) {
  const [selectedJob, setSelectedJob] = useState("all");
  const [students, setStudents] = useState([]);
  const [viewing, setViewing] = useState(null);
  const [refresh, setRefresh] = useState(0);

  const STAGES = [
    { id: "applied",      label: "Applied",      bg: "#E6F1FB", color: "#185FA5" },
    { id: "reviewing",    label: "Reviewing",    bg: "#FEF3E2", color: "#854F0B" },
    { id: "interviewing", label: "Interviewing", bg: "#EAF3DE", color: "#3B6D11" },
    { id: "closed",       label: "Offer / Closed", bg: "#F1EFE8", color: "#5F5E5A" },
    { id: "denied",       label: "Denied",       bg: "#FCEBEB", color: "#A32D2D" },
  ];

  useEffect(() => {
    (async () => {
      const keys = await S.list("user:");
      const all = await Promise.all(keys.map(k => S.get(k)));
      const studs = all.filter(u => u && u.role === "student");
      const myJobIds = jobs.map(j => j.id);

      const withApps = studs.map(s => {
        const k = s.kanban || { applied: [], reviewing: [], interviewing: [], closed: [] };
        // Include employer-side denied bucket too
        const denied = k.denied || [];
        const allApps = [
          ...k.applied.map(a => ({ ...a, stage: "applied" })),
          ...k.reviewing.map(a => ({ ...a, stage: "reviewing" })),
          ...k.interviewing.map(a => ({ ...a, stage: "interviewing" })),
          ...k.closed.map(a => ({ ...a, stage: "closed" })),
          ...denied.map(a => ({ ...a, stage: "denied" })),
        ].filter(a => myJobIds.includes(a.jobId));
        return allApps.length > 0 ? { ...s, myApplications: allApps } : null;
      }).filter(Boolean);

      setStudents(withApps);
    })();
  }, [jobs, refresh]);

  const filtered = selectedJob === "all"
    ? students
    : students.filter(s => s.myApplications.some(a => a.jobId === selectedJob));

  async function moveApplicant(student, app, newStage) {
    // Load fresh student data
    const fresh = await S.get(`user:${student.email}`);
    if (!fresh) return;
    const k = fresh.kanban || { applied: [], reviewing: [], interviewing: [], closed: [], denied: [] };
    if (!k.denied) k.denied = [];

    // Remove from all buckets
    const allBuckets = ["applied", "reviewing", "interviewing", "closed", "denied"];
    allBuckets.forEach(b => { k[b] = (k[b] || []).filter(a => a.jobId !== app.jobId); });

    // Add to new bucket
    k[newStage] = [...(k[newStage] || []), { ...app, stage: newStage, movedAt: new Date().toISOString() }];

    await S.set(`user:${student.email}`, { ...fresh, kanban: k });
    setRefresh(r => r + 1);
    toast(`Moved ${student.name} to ${STAGES.find(s => s.id === newStage)?.label}`);
    // Update viewing if open
    if (viewing && viewing.email === student.email) setViewing(null);
  }

  return (
    <div>
      <div style={{ fontSize: 18, fontWeight: 500, marginBottom: 20 }}>Applicants</div>
      <div style={{ marginBottom: 16, maxWidth: 320 }}>
        <label style={css.label}>Filter by job listing</label>
        <select style={{ ...css.input, background: "#fff", border: "1px solid #ccc" }} value={selectedJob} onChange={e => setSelectedJob(e.target.value)}>
          <option value="all">All listings</option>
          {jobs.map(j => <option key={j.id} value={j.id}>{j.title}</option>)}
        </select>
      </div>

      {filtered.length === 0 && (
        <div style={{ fontSize: 13, color: "var(--color-text-tertiary)", textAlign: "center", padding: 40 }}>No applicants yet.</div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {filtered.map(s => (
          <div key={s.email} style={css.card}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
              <Avatar name={s.name} size={40} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 500 }}>{s.name}</div>
                <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 4 }}>
                  {s.major}{s.graduationYear ? ` · Class of ${s.graduationYear}` : ""}{s.gpa ? ` · GPA ${s.gpa}` : ""}
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 8 }}>
                  {(s.skills || []).slice(0, 5).map(sk => <span key={sk} style={css.badge("#E6F1FB", "#185FA5")}>{sk}</span>)}
                </div>
                {/* Per-application status controls */}
                {s.myApplications.map(app => {
                  const jobName = jobs.find(j => j.id === app.jobId)?.title || app.title;
                  const stage = STAGES.find(st => st.id === app.stage) || STAGES[0];
                  return (
                    <div key={app.jobId} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 8, background: "var(--color-background-secondary)", marginBottom: 6, flexWrap: "wrap" }}>
                      <div style={{ fontSize: 12, fontWeight: 500, flex: 1, minWidth: 120 }}>{jobName}</div>
                      <span style={{ ...css.badge(stage.bg, stage.color), flexShrink: 0 }}>{stage.label}</span>
                      <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                        {app.stage !== "reviewing" && app.stage !== "denied" && (
                          <button style={{ ...css.btn, fontSize: 11, padding: "3px 8px", background: "#FEF3E2", border: "1px solid #EF9F27", color: "#854F0B" }}
                            onClick={() => moveApplicant(s, app, "reviewing")}>Mark Reviewing</button>
                        )}
                        {app.stage !== "interviewing" && app.stage !== "denied" && (
                          <button style={{ ...css.btn, fontSize: 11, padding: "3px 8px", background: "#EAF3DE", border: "1px solid #7AB648", color: "#3B6D11" }}
                            onClick={() => moveApplicant(s, app, "interviewing")}>→ Interview</button>
                        )}
                        {app.stage !== "closed" && app.stage !== "denied" && (
                          <button style={{ ...css.btn, fontSize: 11, padding: "3px 8px", background: "#E6F1FB", border: "1px solid #378ADD", color: "#185FA5" }}
                            onClick={() => moveApplicant(s, app, "closed")}>✓ Offer</button>
                        )}
                        {app.stage !== "denied" && (
                          <button style={{ ...css.btn, fontSize: 11, padding: "3px 8px", background: "#FCEBEB", border: "1px solid #E88080", color: "#A32D2D" }}
                            onClick={() => moveApplicant(s, app, "denied")}>✕ Deny</button>
                        )}
                        {app.stage === "denied" && (
                          <button style={{ ...css.btn, fontSize: 11, padding: "3px 8px" }}
                            onClick={() => moveApplicant(s, app, "applied")}>Undo</button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6, flexShrink: 0 }}>
                {s.resumeData && (
                  <a href={s.resumeData} download={s.resumeFileName} style={{ ...css.btn, fontSize: 11, textDecoration: "none", padding: "4px 10px", textAlign: "center" }}>📄 Resume</a>
                )}
                <button style={{ ...css.btnPrimary, fontSize: 11, padding: "4px 10px" }} onClick={() => setViewing(s)}>View profile</button>
              </div>
            </div>
          </div>
        ))}
      </div>

      {viewing && (
        <Modal title={`${viewing.name}'s profile`} onClose={() => setViewing(null)}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
            <Avatar name={viewing.name} size={48} />
            <div>
              <div style={{ fontSize: 15, fontWeight: 500 }}>{viewing.name}</div>
              <div style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>{viewing.email}</div>
              <div style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>
                {viewing.major}{viewing.graduationYear ? ` · Class of ${viewing.graduationYear}` : ""}{viewing.gpa ? ` · GPA: ${viewing.gpa}` : ""}
              </div>
            </div>
          </div>
          {viewing.bio && <div style={{ fontSize: 13, marginBottom: 12, color: "var(--color-text-secondary)" }}>{viewing.bio}</div>}
          {(viewing.skills || []).length > 0 && (
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 500, marginBottom: 4 }}>Skills</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>{viewing.skills.map(s => <span key={s} style={css.badge("#E6F1FB", "#185FA5")}>{s}</span>)}</div>
            </div>
          )}
          <div style={{ fontSize: 12, fontWeight: 500, marginBottom: 8 }}>Applications</div>
          {viewing.myApplications.map(a => {
            const stage = STAGES.find(st => st.id === a.stage) || STAGES[0];
            return (
              <div key={a.jobId} style={{ padding: "10px 0", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{a.title}</div>
                  <span style={css.badge(stage.bg, stage.color)}>{stage.label}</span>
                </div>
                {a.coverLetter && <div style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>{a.coverLetter}</div>}
              </div>
            );
          })}
          {viewing.resumeData && (
            <a href={viewing.resumeData} download={viewing.resumeFileName} style={{ ...css.btnPrimary, display: "inline-block", textDecoration: "none", marginTop: 12 }}>Download resume</a>
          )}
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ADMIN VIEWS
// ═══════════════════════════════════════════════════════════════════════════════
function AdminDashboard({ user, setUser }) {
  const [tab, setTab] = useState("overview");
  const [toast, setToast] = useState("");
  function showToast(msg) { setToast(msg); setTimeout(() => setToast(""), 3000); }
  const navItems = [{ id: "overview", icon: "🏠", label: "Overview" }, { id: "students", icon: "🎓", label: "Students" }, { id: "employers", icon: "🏢", label: "Employers" }, { id: "jobs", icon: "📋", label: "All Jobs" }, { id: "settings", icon: "⚙️", label: "Site Settings" }];
  const views = { overview: <AdminOverview />, students: <AdminStudents toast={showToast} />, employers: <AdminEmployers toast={showToast} />, jobs: <AdminJobs toast={showToast} />, settings: <AdminSettings user={user} setUser={setUser} toast={showToast} /> };
  return (
    <div style={{ display: "flex" }}>
      <Sidebar items={navItems} active={tab} setActive={setTab} user={user} onLogout={() => setUser(null)} />
      <div style={{ marginLeft: 220, flex: 1, padding: "2rem", minHeight: "100vh", background: "var(--color-background-tertiary)" }}>{views[tab]}</div>
      <Toast msg={toast} />
    </div>
  );
}

function AdminOverview() {
  const [stats, setStats] = useState({ students: 0, employers: 0, pendingEmployers: 0, jobs: 0 });
  useEffect(() => {
    (async () => {
      const ukeys = await S.list("user:"); const users = await Promise.all(ukeys.map(k => S.get(k)));
      const jkeys = await S.list("job:"); const jobs = (await Promise.all(jkeys.map(k => S.get(k)))).filter(Boolean);
      setStats({ students: users.filter(u => u?.role === "student").length, employers: users.filter(u => u?.role === "employer").length, pendingEmployers: users.filter(u => u?.role === "employer" && !u.approved).length, jobs: jobs.filter(j => j.status === "active").length });
    })();
  }, []);
  return (
    <div>
      <div style={{ fontSize: 20, fontWeight: 500, marginBottom: 20 }}>Admin overview</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 24 }}>
        {[{ label: "Students", value: stats.students, color: "#185FA5" }, { label: "Employers", value: stats.employers, color: "#3B6D11" }, { label: "Pending approval", value: stats.pendingEmployers, color: "#854F0B" }, { label: "Active jobs", value: stats.jobs, color: "#185FA5" }].map(s => (
          <div key={s.label} style={css.card}><div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginBottom: 4 }}>{s.label}</div><div style={{ fontSize: 26, fontWeight: 500, color: s.color }}>{s.value}</div></div>
        ))}
      </div>
    </div>
  );
}

function AdminStudents({ toast }) {
  const [students, setStudents] = useState([]);
  const [viewing, setViewing] = useState(null);
  const [refresh, setRefresh] = useState(0);
  useEffect(() => {
    (async () => {
      const keys = await S.list("user:");
      const all = await Promise.all(keys.map(k => S.get(k)));
      setStudents(all.filter(u => u?.role === "student"));
    })();
  }, [refresh]);
  async function deleteUser(u) { await S.del(`user:${u.email}`); setRefresh(r => r + 1); toast("Student removed"); }
  return (
    <div>
      <div style={{ fontSize: 18, fontWeight: 500, marginBottom: 20 }}>Students ({students.length})</div>
      {students.length === 0 && <div style={{ fontSize: 13, color: "var(--color-text-tertiary)", textAlign: "center", padding: 40 }}>No students registered yet.</div>}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {students.map(s => (
          <div key={s.email} style={css.card}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <Avatar name={s.name} size={38} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 500 }}>{s.name}</div>
                <div style={{ fontSize: 11, color: "var(--color-text-secondary)" }}>{s.email} · {s.major || "No major set"}</div>
              </div>
              <button style={{ ...css.btn, fontSize: 11 }} onClick={() => setViewing(s)}>View</button>
              <button style={{ ...css.btnDanger, fontSize: 11 }} onClick={() => deleteUser(s)}>Remove</button>
            </div>
          </div>
        ))}
      </div>
      {viewing && (
        <Modal title={viewing.name} onClose={() => setViewing(null)}>
          <div style={{ fontSize: 13 }}>
            <div><strong>Email:</strong> {viewing.email}</div>
            <div><strong>Major:</strong> {viewing.major || "—"}</div>
            <div><strong>GPA:</strong> {viewing.gpa || "—"}</div>
            <div><strong>Graduation:</strong> {viewing.graduationYear || "—"}</div>
            <div style={{ marginTop: 8 }}><strong>Skills:</strong> {(viewing.skills || []).join(", ") || "None listed"}</div>
            <div style={{ marginTop: 8 }}><strong>Bio:</strong> {viewing.bio || "—"}</div>
            {viewing.resumeFileName && <div style={{ marginTop: 8 }}><strong>Resume:</strong> {viewing.resumeFileName} {viewing.resumeData && <a href={viewing.resumeData} download={viewing.resumeFileName} style={{ color: "#185FA5" }}>Download</a>}</div>}
            <div style={{ marginTop: 8 }}><strong>Joined:</strong> {new Date(viewing.createdAt).toLocaleDateString()}</div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function AdminEmployers({ toast }) {
  const [employers, setEmployers] = useState([]);
  const [refresh, setRefresh] = useState(0);
  useEffect(() => {
    (async () => {
      const keys = await S.list("user:");
      const all = await Promise.all(keys.map(k => S.get(k)));
      setEmployers(all.filter(u => u?.role === "employer"));
    })();
  }, [refresh]);

  async function approve(emp) {
    await S.set(`user:${emp.email}`, { ...emp, approved: true });
    setRefresh(r => r + 1); toast(`${emp.companyName} approved!`);
  }
  async function revoke(emp) {
    await S.set(`user:${emp.email}`, { ...emp, approved: false });
    setRefresh(r => r + 1); toast("Approval revoked");
  }
  async function deleteEmp(emp) { await S.del(`user:${emp.email}`); setRefresh(r => r + 1); toast("Employer removed"); }

  return (
    <div>
      <div style={{ fontSize: 18, fontWeight: 500, marginBottom: 20 }}>Employers ({employers.length})</div>
      {employers.length === 0 && <div style={{ fontSize: 13, color: "var(--color-text-tertiary)", textAlign: "center", padding: 40 }}>No employer accounts yet.</div>}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {employers.map(emp => (
          <div key={emp.email} style={css.card}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <Avatar name={emp.companyName || emp.name} size={38} bg="#C0DD97" color="#27500A" />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 500 }}>{emp.companyName || emp.name}</div>
                <div style={{ fontSize: 11, color: "var(--color-text-secondary)" }}>{emp.email} · {emp.industry || "Industry not set"}</div>
              </div>
              <span style={css.badge(emp.approved ? "#EAF3DE" : "#FAEEDA", emp.approved ? "#3B6D11" : "#854F0B")}>{emp.approved ? "✓ Approved" : "⏳ Pending"}</span>
              {!emp.approved ? <button style={{ ...css.btnPrimary, fontSize: 11 }} onClick={() => approve(emp)}>Approve</button> : <button style={{ ...css.btn, fontSize: 11 }} onClick={() => revoke(emp)}>Revoke</button>}
              <button style={{ ...css.btnDanger, fontSize: 11 }} onClick={() => deleteEmp(emp)}>Remove</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminJobs({ toast }) {
  const [jobs, setJobs] = useState([]);
  const [refresh, setRefresh] = useState(0);
  useEffect(() => {
    (async () => {
      const keys = await S.list("job:");
      const all = await Promise.all(keys.map(k => S.get(k)));
      setJobs(all.filter(Boolean));
    })();
  }, [refresh]);
  async function deleteJob(j) { await S.del(j.id); setRefresh(r => r + 1); toast("Job removed"); }
  async function toggle(j) { await S.set(j.id, { ...j, status: j.status === "active" ? "closed" : "active" }); setRefresh(r => r + 1); }
  return (
    <div>
      <div style={{ fontSize: 18, fontWeight: 500, marginBottom: 20 }}>All jobs ({jobs.length})</div>
      {jobs.length === 0 && <div style={{ fontSize: 13, color: "var(--color-text-tertiary)", textAlign: "center", padding: 40 }}>No jobs posted yet.</div>}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {jobs.map(j => (
          <div key={j.id} style={css.card}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 500 }}>{j.title}</div>
                <div style={{ fontSize: 11, color: "var(--color-text-secondary)" }}>{j.company} · {j.location} · {j.type}</div>
              </div>
              <span style={css.badge(j.status === "active" ? "#EAF3DE" : "#F1EFE8", j.status === "active" ? "#3B6D11" : "#5F5E5A")}>{j.status}</span>
              <button style={{ ...css.btn, fontSize: 11 }} onClick={() => toggle(j)}>{j.status === "active" ? "Close" : "Activate"}</button>
              <button style={{ ...css.btnDanger, fontSize: 11 }} onClick={() => deleteJob(j)}>Delete</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminSettings({ user, setUser, toast }) {
  const [form, setForm] = useState({ name: user.name, password: "" });
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
  async function save() {
    const updates = { name: form.name };
    if (form.password) updates.password = form.password;
    const updated = { ...user, ...updates };
    await S.set(`user:${user.email}`, updated);
    setUser(updated); toast("Settings saved!");
  }
  async function exportData() {
    const ukeys = await S.list("user:"); const users = await Promise.all(ukeys.map(k => S.get(k)));
    const jkeys = await S.list("job:"); const jobs = await Promise.all(jkeys.map(k => S.get(k)));
    const blob = new Blob([JSON.stringify({ users: users.filter(Boolean), jobs: jobs.filter(Boolean), exportedAt: new Date().toISOString() }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "careerconnect_export.json"; a.click();
    URL.revokeObjectURL(url); toast("Data exported!");
  }
  return (
    <div style={{ maxWidth: 500 }}>
      <div style={{ fontSize: 18, fontWeight: 500, marginBottom: 20 }}>Site settings</div>
      <div style={css.card}>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 12 }}>Admin account</div>
        <Input label="Display name" value={form.name} onChange={set("name")} />
        <Input label="New password (leave blank to keep current)" type="password" value={form.password} onChange={set("password")} />
        <button style={css.btnPrimary} onClick={save}>Save</button>
      </div>
      <div style={{ ...css.card, marginTop: 12 }}>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8 }}>Data export</div>
        <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 12 }}>Download all users and job data as a JSON file to store on your computer.</div>
        <button style={css.btnPrimary} onClick={exportData}>⬇ Export all data to JSON</button>
      </div>
    </div>
  );
}

// ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState({ msg: "", type: "success" });

  function showToast(msg, type = "success") { setToast({ msg, type }); setTimeout(() => setToast({ msg: "", type: "success" }), 3000); }

  useEffect(() => {
    seedAdmin().then(() => setLoading(false));
  }, []);

  function handleLogin(u) {
    if (u.role === "employer" && !u.approved) { setUser(null); showToast("Your employer account is pending admin approval.", "error"); return; }
    setUser(u);
  }

  function handleSetUser(u) {
    if (u === null) { setUser(null); return; }
    setUser(u);
  }

  if (loading) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", fontSize: 14, color: "var(--color-text-secondary)" }}>Loading Career Connect…</div>;
  if (!user) return <><AuthScreen onLogin={handleLogin} /><Toast msg={toast.msg} type={toast.type} /></>;

  if (user.role === "student") return <><StudentDashboard user={user} setUser={handleSetUser} toast={showToast} /><Toast msg={toast.msg} type={toast.type} /></>;
  if (user.role === "employer") return <><EmployerDashboard user={user} setUser={handleSetUser} /><Toast msg={toast.msg} type={toast.type} /></>;
  if (user.role === "admin") return <><AdminDashboard user={user} setUser={handleSetUser} /><Toast msg={toast.msg} type={toast.type} /></>;

  return <div>Unknown role</div>;
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
